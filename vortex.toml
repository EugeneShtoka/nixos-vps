[server]
unix_socket = "/run/vortex/vortex.sock"
db_path     = "/var/lib/vortex/state.db"

[workflows.mx-message]
tasks = [
  { id = "passthrough", exec = "printf '{\"text\":\"%s\",\"destination\":\"homeserver\",\"room_id\":\"%s\",\"sender\":\"%s\"}' '{{trigger.text}}' '{{trigger.room}}' '{{trigger.sender}}'" },
  { id = "notify", topic = "mx-notify", server = "https://ntfy.cloud-surf.com", message = "{{trigger.text}}", title = "{{trigger.sender}} [{{trigger.room}}]" },
]
