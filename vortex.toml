[server]
unix_socket = "/run/vortex/vortex.sock"
db_path     = "/var/lib/vortex/state.db"

[workflows.mx-message]
correlation_id = "{{trigger.id}}"
tasks = [
  { type = "notify",   id = "notify",             topic = "mx-notify",    server = "https://ntfy.cloud-surf.com", message = "{{trigger.text}}", title = "{{trigger.sender}} [{{trigger.room}}]", when = 'trigger.event_id == ""' },
  { type = "spawn",    id = "check_code_sender",  exe = "jx-match", args = ["-e", "sender in env.MATRIX_CODE_SENDERS"] },
  { type = "spawn",    id = "extract_code",       exe = "clipkit",  args = ["--json", "text", "--extract-code"], when = "check_code_sender" },
  { type = "notify",   id = "notify_clipboard",   topic = "mx-clipboard", server = "https://ntfy.cloud-surf.com", message = "{{tasks.extract_code.stdout}}", when = "extract_code" },
  { type = "response", id = "reply",              template = '{"id":"{{correlation_id}}","status":"ok","text":{{json trigger.text}},"room_id":{{json trigger.room}},"sender":{{json trigger.sender}}}' },
]
